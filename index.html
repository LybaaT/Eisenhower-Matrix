<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eisenhower Matrix</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap');

    :root {
      --bg-1: #f8f6f1;
      --bg-2: #f3efe7;
      --card: #fcfbf8;
      --text: #1f1d1b;
      --muted: #6d6861;
      --border: rgba(37, 35, 33, 0.17);
      --border-soft: rgba(37, 35, 33, 0.1);
      --accent: #1f1f1e;
      --accent-dark: #111111;
      --q1: linear-gradient(145deg, #ffe6df 0%, #fff3ef 100%);
      --q2: linear-gradient(145deg, #e7f5e8 0%, #f2fbf3 100%);
      --q3: linear-gradient(145deg, #fff1cc 0%, #fff8e6 100%);
      --q4: linear-gradient(145deg, #e8f0ff 0%, #f3f7ff 100%);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, #ffffff 0%, transparent 45%),
        radial-gradient(circle at 100% 0%, #f0ebe0 0%, transparent 40%),
        linear-gradient(165deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .wrapper {
      max-width: 1180px;
      margin: 0 auto;
      padding: 2.25rem 1rem 2.6rem;
    }

    h1 {
      font-family: "Montserrat", "Inter", "Segoe UI", Arial, sans-serif;
      margin: 0 0 0.45rem;
      font-size: clamp(1.95rem, 2.5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #171513;
    }

    .subtext {
      margin: 0 0 1.4rem;
      color: var(--muted);
      max-width: 720px;
      font-size: 1.01rem;
      line-height: 1.55;
    }

    .canvas {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(37, 35, 33, 0.1);
      border-radius: 1.25rem;
      backdrop-filter: blur(8px);
      padding: 1.1rem;
    }

    .controls {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      margin-bottom: 1.05rem;
    }

    .btn {
      border: 1px solid var(--border);
      background: #fefdfb;
      color: #22201f;
      border-radius: 0.7rem;
      padding: 0.64rem 0.95rem;
      font-size: 0.92rem;
      font-weight: 550;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: all 160ms ease;
    }

    .btn:hover {
      border-color: rgba(37, 35, 33, 0.36);
      transform: translateY(-1px);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-color: transparent;
      color: #fff;
    }

    .matrix {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .quadrant {
      border: 1px solid var(--border-soft);
      border-radius: 1rem;
      padding: 0.95rem;
      min-height: 270px;
    }

    .quadrant h2 {
      font-family: "Montserrat", "Inter", "Segoe UI", Arial, sans-serif;
      margin: 0;
      font-size: 1.04rem;
      color: #1a1714;
    }

    .quadrant p {
      margin: 0.3rem 0 0.85rem;
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.01em;
    }

    .q1 { background: var(--q1); }
    .q2 { background: var(--q2); }
    .q3 { background: var(--q3); }
    .q4 { background: var(--q4); }

    .task-list {
      list-style: none;
      margin: 0 0 0.55rem;
      padding: 0;
      display: grid;
      gap: 0.56rem;
    }

    .task-item {
      display: flex;
      gap: 0.45rem;
      align-items: flex-start;
    }

    .task-main {
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      flex: 1;
    }

    .task-check {
      width: 18px;
      height: 18px;
      margin-top: 0.52rem;
      accent-color: #23211f;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-input {
      width: 100%;
      flex: 1;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      border: 1px solid rgba(37, 35, 33, 0.18);
      background: #fff;
      border-radius: 0.74rem;
      padding: 0.62rem 0.72rem;
      font-size: 0.93rem;
      line-height: 1.35;
      color: #24211e;
      transition: border-color 140ms ease, background 140ms ease;
      resize: none;
      min-height: 38px;
      max-height: 160px;
      overflow-y: auto;
    }

    .task-input::placeholder { color: #9a938a; }

    .task-input:focus {
      outline: none;
      border-color: rgba(37, 35, 33, 0.52);
      background: #fff;
    }

    .task-item.done .task-input {
      text-decoration: line-through;
      color: #857f79;
    }

    .icon-btn {
      border: 1px solid rgba(37, 35, 33, 0.2);
      border-radius: 0.64rem;
      background: rgba(255, 255, 255, 0.92);
      color: #45413d;
      width: 36px;
      height: 36px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 150ms ease;
    }

    .icon-btn:hover {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }

    .axis-labels {
      display: flex;
      justify-content: space-between;
      margin: 0 0 0.78rem;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .footer-note {
      margin-top: 1.05rem;
      color: var(--muted);
      font-size: 0.87rem;
    }

    .progress-dock {
      position: fixed;
      right: 12px;
      bottom: 12px;
      width: 210px;
      border: 1px solid var(--border-soft);
      border-radius: 0.7rem;
      background: rgba(252, 251, 248, 0.96);
      padding: 0.5rem 0.55rem;
      font-size: 0.75rem;
      color: #4f4b46;
      z-index: 1200;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.35rem;
    }

    .progress-track {
      height: 6px;
      background: #e5dfd4;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: #20201f;
      transition: width 180ms ease;
    }

    @media (max-width: 820px) {
      .matrix { grid-template-columns: 1fr; }
    }

    @media print {
      @page {
        size: auto;
        margin: 10mm;
      }

      body { background: white; }
      .wrapper {
        max-width: none;
        padding: 0;
      }
      .canvas {
        border: 0;
        padding: 0;
        background: transparent;
      }
      .controls, .icon-btn, .progress-dock { display: none; }
      .matrix {
        grid-template-columns: 1fr 1fr;
        gap: 0.45cm;
        width: 100%;
      }
      .quadrant { border-color: #d8d1c6; }
      .quadrant {
        min-height: auto;
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .task-input {
        border: 0;
        background: transparent;
        padding-left: 0;
        max-height: none;
        overflow: visible;
      }
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <h1>Eisenhower Matrix</h1>
    <p class="subtext">Capture tasks by urgency and importance. This matrix auto-saves in your browser.</p>

    <section class="canvas">
      <div class="controls">
        <button class="btn primary" id="addRowAll">Add one task row to all quadrants</button>
        <button class="btn" id="clearAll">Clear all</button>
        <button class="btn" onclick="window.print()">Print / Save as PDF</button>
        <button class="btn" id="exportTxt">Export as text</button>
      </div>

      <div class="axis-labels">
        <span><strong>Horizontal:</strong> Urgent → Not urgent</span>
        <span><strong>Vertical:</strong> Important ↓ Not important</span>
      </div>

      <section class="matrix" id="matrix"></section>
    </section>

    <p class="footer-note">Tip: Keep each row to one actionable task. Review and rebalance daily.</p>
  </main>
  <aside class="progress-dock" id="progressDock">
    <div class="progress-row">
      <strong>Tasks done</strong>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </aside>

  <script>
    const KEY = 'eisenhower-matrix-v1';

    const config = [
      { id: 'q1', className: 'q1', title: 'Do First', subtitle: 'Urgent + Important' },
      { id: 'q2', className: 'q2', title: 'Schedule', subtitle: 'Not Urgent + Important' },
      { id: 'q3', className: 'q3', title: 'Delegate', subtitle: 'Urgent + Not Important' },
      { id: 'q4', className: 'q4', title: 'Eliminate', subtitle: 'Not Urgent + Not Important' }
    ];

    const emptyTask = () => ({ text: '', done: false });
    const defaults = { q1: [emptyTask()], q2: [emptyTask()], q3: [emptyTask()], q4: [emptyTask()] };

    const state = loadState();
    const matrix = document.getElementById('matrix');

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(KEY));
        if (!parsed) return structuredClone(defaults);
        for (const q of Object.keys(defaults)) {
          if (!Array.isArray(parsed[q]) || parsed[q].length === 0) {
            parsed[q] = [emptyTask()];
            continue;
          }
          parsed[q] = parsed[q].map((item) => {
            if (typeof item === 'string') return { text: item, done: false };
            return {
              text: typeof item?.text === 'string' ? item.text : '',
              done: Boolean(item?.done)
            };
          });
        }
        return parsed;
      } catch {
        return { q1: [emptyTask()], q2: [emptyTask()], q3: [emptyTask()], q4: [emptyTask()] };
      }
    }

    function saveState() {
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function buildQuadrant(q) {
      const wrap = document.createElement('article');
      wrap.className = `quadrant ${q.className}`;
      wrap.innerHTML = `<h2>${q.title}</h2><p>${q.subtitle}</p>`;

      const list = document.createElement('ul');
      list.className = 'task-list';

      state[q.id].forEach((task, index) => {
        list.appendChild(buildTaskRow(q.id, index, task));
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'btn';
      addBtn.textContent = `+ Add task`;
      addBtn.addEventListener('click', () => {
        state[q.id].push(emptyTask());
        saveState();
        render();
      });

      wrap.append(list, addBtn);
      return wrap;
    }

    function autoGrow(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = `${Math.min(textarea.scrollHeight, 160)}px`;
    }

    function buildTaskRow(quadrantId, index, value) {
      const item = document.createElement('li');
      item.className = 'task-item';
      if (value.done) item.classList.add('done');

      const taskMain = document.createElement('div');
      taskMain.className = 'task-main';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'task-check';
      checkbox.checked = value.done;
      checkbox.addEventListener('change', (event) => {
        state[quadrantId][index].done = event.target.checked;
        saveState();
        render();
      });

      const input = document.createElement('textarea');
      input.className = 'task-input';
      input.placeholder = 'Enter task…';
      input.rows = 1;
      input.value = value.text;
      input.addEventListener('input', (event) => {
        state[quadrantId][index].text = event.target.value;
        saveState();
        autoGrow(event.target);
        updateProgress();
      });
      requestAnimationFrame(() => autoGrow(input));

      const remove = document.createElement('button');
      remove.className = 'icon-btn';
      remove.textContent = '−';
      remove.title = 'Remove row';
      remove.addEventListener('click', () => {
        state[quadrantId].splice(index, 1);
        if (state[quadrantId].length === 0) state[quadrantId].push(emptyTask());
        saveState();
        render();
      });

      taskMain.append(checkbox, input);
      item.append(taskMain, remove);
      return item;
    }

    function exportAsText() {
      const lines = ['Eisenhower Matrix', ''];
      for (const q of config) {
        lines.push(`${q.title} (${q.subtitle})`);
        state[q.id]
          .map((task) => task.text.trim())
          .filter(Boolean)
          .forEach((task) => lines.push(`- ${task}`));
        lines.push('');
      }

      const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `eisenhower-matrix-${new Date().toISOString().slice(0,10)}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function updateProgress() {
      const all = Object.values(state).flat();
      const nonEmpty = all.filter((task) => task.text.trim().length > 0);
      const done = nonEmpty.filter((task) => task.done).length;
      const pct = nonEmpty.length ? Math.round((done / nonEmpty.length) * 100) : 0;

      document.getElementById('progressPct').textContent = `${pct}%`;
      document.getElementById('progressFill').style.width = `${pct}%`;
    }

    function render() {
      matrix.innerHTML = '';
      config.forEach((q) => matrix.appendChild(buildQuadrant(q)));
      updateProgress();
    }

    document.getElementById('addRowAll').addEventListener('click', () => {
      for (const q of config) state[q.id].push(emptyTask());
      saveState();
      render();
    });

    document.getElementById('clearAll').addEventListener('click', () => {
      for (const q of config) state[q.id] = [emptyTask()];
      saveState();
      render();
    });

    document.getElementById('exportTxt').addEventListener('click', exportAsText);

    render();
  </script>
</body>
</html>
